name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict the default GITHUB_TOKEN to read-only; no CI job needs write access.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test:cov
      - name: Upload coverage to Codecov
        # Dependabot PRs run with a restricted token and no access to repository
        # secrets, so CODECOV_TOKEN is empty and Codecov rejects the upload
        # ("Token required because branch is protected"). With fail_ci_if_error
        # that sinks the whole job. Skip the upload for Dependabot; coverage is
        # still uploaded on pushes to main and on regular (non-bot) PRs.
        if: matrix.node-version == 22 && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test:pack

  peer-compat:
    name: Peer floors (nest ${{ matrix.nest }} / swagger ${{ matrix.swagger }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - nest: '10.0.0'
            swagger: '7.0.0'
          - nest: '10.0.0'
            swagger: '8.0.0'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Pin lowest supported peers
        run: >
          pnpm add -D
          @nestjs/common@${{ matrix.nest }}
          @nestjs/core@${{ matrix.nest }}
          @nestjs/platform-express@${{ matrix.nest }}
          @nestjs/platform-fastify@${{ matrix.nest }}
          @nestjs/testing@${{ matrix.nest }}
          @nestjs/swagger@${{ matrix.swagger }}
      - run: pnpm run test

  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            --call-analysis=false
            .
